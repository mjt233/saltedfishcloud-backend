server:
  port: 8087
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true
  tomcat:
    remoteip:
      remote-ip-header: X-Real-IP
spring:
  jpa:
    database: mysql
    open-in-view: false
    hibernate:
      ddl-auto: none
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1/t_xyy?useSSL=false&serverTimezone=UTC
    username: root
    password: test
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  servlet:
    multipart:
      max-file-size: 8192MB
      max-request-size: 8192MB
logging:
  level:
    root: info
    org: warn
    com: warn
    com.sfc: debug
