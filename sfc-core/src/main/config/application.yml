server:
  port: 8087
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: false
  tomcat:
    remoteip:
      remote-ip-header: X-Real-IP

spring:
  jpa:
    database: mysql
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        order_inserts: true
        enable_lazy_load_no_trans: true
        jdbc:
          batch_size: 200

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1/d_xyy?useSSL=false&serverTimezone=UTC
    username: root
    password: test
    hikari:
      transaction-isolation: TRANSACTION_READ_COMMITTED
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
  servlet:
    multipart:
      max-file-size: 8192MB
      max-request-size: 8192MB
  profiles:
    active: ^spring-profile^
  web:
    resources:
      add-mappings: false
logging:
  file:
    name: ./log/output.log
  level:
    org: warn
    com: warn
    com.sfc: info
    com.xiaotao: info
    com.saltedfishcloud: info
#    com.xiaotao.saltedfishcloud.SaltedfishcloudApplication: warn

management:
  health:
    mail:
      enabled: false
app:
  version: ^project.version^

sys:
  # OIDC/OAuth2 授权服务器配置
  oidc:
    # 是否启用内置 OIDC 授权服务器
    enabled: true
    # OIDC Issuer 地址，例如 https://cloud.example.com
    issuer: ${OIDC_ISSUER:http://localhost:8087}
    authorization-endpoint: /oauth2/authorize
    token-endpoint: /oauth2/token
    device-authorization-endpoint: /oauth2/device_authorization
    device-verification-endpoint: /oauth2/device_verification
    user-info-endpoint: /oauth2/userinfo
    jwk-set-endpoint: /oauth2/jwks
    revocation-endpoint: /oauth2/revoke
    introspection-endpoint: /oauth2/introspect
    logout-endpoint: /connect/logout
    jwk:
      key-id: ${OIDC_JWK_KEY_ID:oidc-key-1}
      key-store-path: ${OIDC_JWK_STORE_PATH:./oidc-jwk.json}
