logging:
  level:
    org: warn
    com: warn
    com.xiaotao: info
    com.saltedfishcloud: info


sys:
  redis:
    # Redis 是否启用，默认为 true。设置为 false 可以��不启动 Redis 的情况下运行系统
    # 注意：禁用Redis会影响缓存（cache-provider需设置为local）、资源锁（lock-provider需设置为local）、消息队列（mq-provider设置为local）、RPC等功能
    enabled: true
  service:
    # 缓存provider，默认 redis，可选 local（程序内缓存）
    cache-provider: redis
    # 资源锁 provider，默认 redisson，可选 local（仅当前服务实例内生效，且不注入 Redisson）
    lock-provider: redisson
    # MQ provider，默认 redis
    # 启用 sfc-ext-local-mq 插件时，可选local。使用local仅支持单 JVM 进程内消息语义
    mq-provider: redis
    # RPC provider，默认 redis，可选 mq（基于 MQService 实现）
    rpc-provider: redis
    local-cache:
      # 本地缓存默认过期时间（毫秒），默认 15 分钟
      default-expire-ms: 900000
      # 本地缓存最大数量，超过后按最旧写入顺序淘汰
      max-cache-size: 4096
      # 是否启用本地缓存持久化，启用后会定时异步刷盘，并在系统关闭时再次落盘
      persist-enabled: true
      # 本地缓存持久化文件路径，系统启动时会尝试从该文件恢复缓存内容
      persist-file-path: ./localcache.data
    local-mq:
      # 本地消息队列的历史消息记录最长长度，默认为 4096。过大的值可能会导致OOM
      max-queue-size: 4096
      # 淘汰目标比例，消息数超出 max-queue-size 时淘汰至 max-queue-size * evict-target-ratio，默认 0.85
      evict-target-ratio: 0.85
  store:
    # 压缩文件操作使用的文件编码格式，默认使用系统默认编码，Linux: UTF-8，Windows: GBK
    archive-encoding: gbk

    # 存储服务类型，可选local、minio（需要拓展）、hdfs（需要拓展）
    type: local

    # 各类资源根目录存储路径
    root: store

    # 公共网盘根目录路径
    public-root: public

    # minio存储配置
    minio:
      access-key: xyy
      secret-key: xyy123456
      bucket: xyy

    # hdfs存储配置
    hdfs:
      url: hdfs://localhost:9000
      root: /xyy2
      user: xiaotao

  # OIDC/OAuth2 授权服务器配置
  oidc:
    # 是否启用内置 OIDC 授权服务器
    enabled: false
    # OIDC Issuer 地址，例如 https://cloud.example.com
    issuer:
    authorization-endpoint: /oauth2/authorize
    token-endpoint: /oauth2/token
    user-info-endpoint: /oauth2/userinfo
    jwk-set-endpoint: /oauth2/jwks
    revocation-endpoint: /oauth2/revoke
    introspection-endpoint: /oauth2/introspect
    logout-endpoint: /connect/logout
    jwk:
      key-id: oidc-key-1
      key-store-path: ./oidc-jwk.json
