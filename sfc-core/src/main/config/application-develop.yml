server:
  port: 8087
spring:
  jpa:
    database: default
    show-sql: true
  thymeleaf:
    cache: false
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: "jdbc:sqlite:./xyy.db"
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://127.0.0.1/d_xyy?useSSL=false&serverTimezone=UTC
#    username: root
#    password: test
  data:
    redis:
      host: 127.0.0.1
      port: 6379
logging:
  level:
    test: info
    org: warn
    com: warn
    com.sfc: debug
    com.xiaotao: debug
    com.saltedfishcloud: debug
    com.xiaotao.saltedfishcloud.aspect: info
management:
  endpoints:
    web:
      exposure:
        include: startup

# 插件系统配置
plugin:
  # 额外加载的插件资源
  extra-resource:
#    - sfc-ext/sfc-ext-quick-share
#    - sfc-ext/sfc-ext-demo
#    - sfc-ext/sfc-ext-ftp-server
#    - sfc-ext/sfc-ext-minio-store
#    - sfc-ext/sfc-ext-samba-store
#    - sfc-ext/sfc-ext-hadoop-store
#    - sfc-ext/sfc-ext-music
#    - sfc-ext/sfc-ext-sftp-store
#    - sfc-ext/sfc-ext-ftp-store
#    - sfc-ext/sfc-ext-video-enhance
#    - sfc-ext/sfc-ext-oss-store
#    - sfc-ext/sfc-ext-network-tools
#    - sfc-ext/sfc-ext-web-shell
#    - sfc-ext/sfc-ext-apk-parser
#    - sfc-ext/sfc-ext-static-publish
#    - sfc-ext/sfc-ext-only-office
#    - sfc-ext/sfc-ext-webrtc
#    - sfc-ext/sfc-ext-webdav
#    - sfc-ext/sfc-ext-webdav-store
    - sfc-ext/sfc-ext-local-mq
    - sfc-ext/sfc-ext-mcp
    - sfc-ext/sfc-ext-pxe-boot

  # 开发模式下可设置为false 关闭插件前端资源的自动加载
  use-auto-load-resource: false


sys:
  redis:
    # Redis 是否启用，默认为 true。设置为 false 可以在不启动 Redis 的情况下运行系统
    # 注意：禁用Redis会影响缓存（cache-provider需设置为local）、资源锁（lock-provider需设置为local）、消息队列（mq-provider设置为local）、RPC等功能
    enabled: false
  service:
    # 缓存provider，默认 redis，可选 local（程序内缓存）
    cache-provider: local
    # 资源锁 provider，默认 redisson，可选 local（仅当前服务实例内生效，且不注入 Redisson）
    lock-provider: local
    # MQ provider，默认 redis
    # 启用 sfc-ext-local-mq 插件时，可选local。使用local仅支持单 JVM 进程内消息语义
    mq-provider: local
    # RPC provider，默认 redis，可选 mq（基于 MQService 实现）
    rpc-provider: mq
    local-cache:
      # 本地缓存默认过期时间（毫秒），默认 15 分钟
      default-expire-ms: 900000
      # 本地缓存最大数量，超过后按最旧写入顺序淘汰
      max-cache-size: 4096
      # 是否启用本地缓存持久化，启用后会定时异步刷盘，并在系统关闭时再次落盘
      persist-enabled: true
      # 本地缓存持久化文件路径，系统启动时会尝试从该文件恢复缓存内容
      persist-file-path: ./localcache.data
    local-mq:
      # 本地消息队列的历史消息记录最长长度，默认为 4096。过大的值可能会导致OOM
      max-queue-size: 4096
      # 淘汰目标比例，消息数超出 max-queue-size 时淘汰至 max-queue-size * evict-target-ratio，默认 0.85
      evict-target-ratio: 0.85
  store:
    # 压缩文件操作使用的文件编码格式，默认使用系统默认编码，Linux: UTF-8，Windows: GBK
    archive-encoding: ${ARCHIVE_ENCODING:}

    # 存储服务类型，可选local、minio（需要拓展）、hdfs（需要拓展）
    type: local

    # 各类资源根目录存储路径
    root: store

    # 单独的公共网盘根目录路径
    # 仅在 管理员后台-系统-基础配置-存储模式 设置为 UNIQUE(默认) 时有效。（注：切换存储模式会触发全网盘数据重新组织，中途出错可能会导致数据丢失和损坏，请谨慎切换并做好数据备份）
    public-root: public

    # minio存储配置
    # 安装了 sfc-ext-minio-store 插件后，sys.store.type设置为minio后生效
    minio:
      access-key: ${MINIO_ACCESS_KEY:xyy}
      secret-key: ${MINIO_SECRET_KEY:xyy123456}
      bucket: ${MINIO_BUCKET:xyy}

    # hdfs存储配置
    # 安装了 sfc-ext-hadoop-store 插件后，sys.store.type设置为hdfs后生效
    # 注意：该插件未在jdk25中进行测试，使用时请确保hadoop版本和jdk版本兼容，且hadoop环境配置正确，否则可能会导致程序无法启动或运行时异常
    hdfs:
      url: ${HDFS_URL:hdfs://localhost:9000}
      root: ${HDFS_ROOT:/xyy2}
      user: ${HDFS_USER:xiaotao}
