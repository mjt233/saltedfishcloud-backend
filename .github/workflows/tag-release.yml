name: tag-release

# 在推送版本标签时触发，或通过 GitHub 网页手动触发（需指定 tag 名称，例如 v3.1.0）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag 名称（例如 v3.1.0）'
        required: true
        type: string

# 创建 Release 并上传附件需要写入仓库内容权限
permissions:
  contents: write

jobs:
  build-and-release:
    # 在 Linux runner 上完成构建、打包与发布
    runs-on: ubuntu-latest

    steps:
      # 拉取后端仓库完整历史，供 tag 与 master 归属校验使用
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 安装 Java 25 并启用 Maven 依赖缓存
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # 校验 tag 对应提交是否在 master 上，并生成 Release 元数据
      - name: Validate tag commit and prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # 手动触发时取 input.tag，推送标签时取 GITHUB_REF_NAME
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            git fetch --tags
            COMMIT_SHA="$(git rev-list -n 1 "refs/tags/${TAG}")"
          else
            TAG="${GITHUB_REF_NAME}"
            COMMIT_SHA="$(git rev-list -n 1 "${GITHUB_REF}")"
          fi

          git fetch origin master
          if ! git merge-base --is-ancestor "${COMMIT_SHA}" origin/master; then
            echo "::error::Tag ${TAG} does not point to a commit on master."
            exit 1
          fi

          BODY="$(git log -1 --format=%b "${COMMIT_SHA}")"
          SUBJECT="$(git log -1 --format=%s "${COMMIT_SHA}")"
          if [ -z "${BODY}" ]; then
            BODY="${SUBJECT}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          printf '%s\n' "${BODY}" > release-notes.md

      # 拉取同标签版本的前端仓库代码
      - name: Checkout frontend repository at same tag
        uses: actions/checkout@v4
        with:
          repository: mjt233/saltedfishcloud-frontend
          ref: ${{ steps.meta.outputs.tag }}
          path: saltedfishcloud-frontend

      # 安装 Node.js 24，并按前端 lock 文件启用 npm 缓存
      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: saltedfishcloud-frontend/package-lock.json

      # 在前端目录安装依赖并构建 dist
      - name: Build frontend
        shell: bash
        working-directory: saltedfishcloud-frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build

      # 指定前端构建目录给后端打包流程，并使用 CPU 核数并行构建
      - name: Build with Maven
        env:
          SFC_FRONT_END_PATH: ${{ github.workspace }}/saltedfishcloud-frontend
        run: mvn -B install package -T "$(nproc)"

      # 生成两个发布压缩包：主程序包（排除 ext-available）与扩展包
      - name: Create release archives
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"

          if [ ! -d "release" ]; then
            echo "::error::release directory not found after Maven build."
            exit 1
          fi

          if [ ! -d "release/ext-available" ]; then
            echo "::error::release/ext-available directory not found after Maven build."
            exit 1
          fi

          rm -f "saltedfishcloud-${TAG}.zip" "ext-available.${TAG}.zip"

          zip -r "saltedfishcloud-${TAG}.zip" release -x "release/ext-available/*"
          (
            cd release/ext-available
            zip -r "../../ext-available.${TAG}.zip" .
          )

      # 创建 GitHub Release，并上传两个 zip 附件
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: release-notes.md
          files: |
            saltedfishcloud-${{ steps.meta.outputs.tag }}.zip
            ext-available.${{ steps.meta.outputs.tag }}.zip

