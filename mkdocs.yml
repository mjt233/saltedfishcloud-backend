site_name: 咸鱼云网盘
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
#    - navigation.sections
#    - navigation.indexes
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - 用户手册:
    - 简介: index.md
    - 快速开始:
      - 运行部署:
        - 常规部署: quick-start/index.md
        - Docker 与容器化:
          - 概述: quick-start/docker/index.md
          - Dockerfile 构建: quick-start/docker/dockerfile.md
          - Docker Compose 部署: quick-start/docker/docker-compose.md
      - 配置参数: quick-start/config.md
      - 关于前端: quick-start/front-end.md
      - 衍生项目: quick-start/other.md
    - 插件:
      - 插件系统说明: extension/index.md
      - 插件列表:
        - FTP服务 ftp-server: extension/ftp-server.md
        - OSS对象存储 oss-store: extension/oss-store.md
        - Minio对象存储 minio-store: extension/minio-store.md
        - 音乐插件 music: extension/music.md
        - OnlyOffice在线文档 only-office: extension/onlyoffice.md
        - WebRTC应用 webrtc: extension/webrtc.md
        - WebDAV文件共享 webdav: extension/webdav.md
        - Hadoop存储 hadoop-store: extension/hadoop-store.md
        - Samba文件共享 samba-store: extension/samba-store.md
        - SFTP存储 sftp-store: extension/sftp-store.md
        - FTP存储 ftp-store: extension/ftp-store.md
        - 视频功能增强 video-enhance: extension/video-enhance.md
        - 快捷分享 quick-share: extension/quick-share.md
        - WebShell web-shell: extension/web-shell.md
        - 网络工具 network-tools: extension/network-tools.md
        - 静态资源站点 static-publish: extension/static-publish.md
        - MCP服务 mcp: extension/mcp.md
  - 开发手册:
    - 简介: develop/index.md
    - 项目构建: develop/build.md
    - Git 提交规范: develop/framework/git-commit-convention.md
    - 系统功能架构:
      - 文件系统:
        - 文件操作: develop/framework/filesystem/file-operations.md
        - 存储架构与挂载扩展: develop/framework/filesystem/storage-architecture.md
        - 附属存储: develop/framework/filesystem/attach-storage.md
      - 配置与特性服务: develop/framework/config-hello-service.md
      - 压缩引擎扩展: develop/framework/archive-engine-extension.md
      - 集群兼容: develop/framework/cluster.md
      - 异步任务: develop/framework/async-task.md
      - 定时任务: develop/framework/schedule.md
      - 版本更新数据迁移钩子: develop/framework/version-update-hook.md
    - 插件开发指南:
      - 创建插件: develop/plugin/create-plugin.md
      - Spring Boot集成: develop/plugin/springboot-integration.md
      - 插件配置参数: develop/plugin/config-properties.md
      - 插件前端开发: develop/plugin/create-front-end.md
      - 桌面组件注册: develop/plugin/desktop-component.md
  - OAuth开放平台:
    - 概述: oauth/index.md
    - OIDC 认证: oauth/oidc.md
    - 实现参考: oauth/impl-ref.md
    - 开放接口列表:
      - 概述与统一规范: oauth/api/index.md
      - 用户相关接口:
        - 获取用户基本信息: oauth/api/user/profile.md
      - 网盘存储相关接口:
        - 获取文件列表: oauth/api/storage/file-list.md
        - 上传文件: oauth/api/storage/upload.md
        - 下载文件: oauth/api/storage/download.md
        - 创建下载链接: oauth/api/storage/download-link.md
        - 创建目录: oauth/api/storage/mkdir.md
        - 复制文件或目录: oauth/api/storage/copy.md
        - 移动文件或目录: oauth/api/storage/move.md
        - 重命名文件或目录: oauth/api/storage/rename.md
        - 删除文件或目录: oauth/api/storage/delete.md
  - 版本更新日志:
    - v3.1.2: release-notes/3.1.2.md
    - v3.1.1: release-notes/3.1.1.md
    - v3.1.0: release-notes/3.1.0.md
