spring:
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: saltedfishcloud-mcp
        version: 3.1.1
        instructions: 访问咸鱼云网盘工具，支持公共网盘与私人网盘的文件列表、删除、复制、移动、上传、重命名、目录创建与用户信息获取能力。
        streamable-http:
          mcp-endpoint: /api/mcp/stream
        capabilities:
          tool: true
          prompt: true
          resource: false
          completion: false
